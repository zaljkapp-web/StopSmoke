name: Android Build 🚀

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper
      # Frissítés a 9.3.1-es verzióra
      run: gradle wrapper --gradle-version 9.3.1

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Debug Keystore
      id: cache-keystore
      uses: actions/cache@v4
      with:
        path: debug.keystore
        key: debug-keystore-v1
        
    - name: Generate Debug Keystore
      if: steps.cache-keystore.outputs.cache-hit != 'true'
      run: keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"
    - name: Build Debug APK
      # Itt pedig kikapcsoljuk a hisztis gyorsítótárat
      run: ./gradlew assembleDebug --no-configuration-cache --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
